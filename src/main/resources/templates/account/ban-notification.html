<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Thong bao khoa tai khoan')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-ban')}"></div>

<div class="container mt-5" style="max-width: 620px;">
  <div class="alert alert-danger shadow-sm" role="alert">
    <h4 class="alert-heading">Thong bao khoa tai khoan</h4>
    <p class="mb-0" th:text="${message}">Tai khoan cua ban da bi khoa tam thoi.</p>
  </div>
  <a th:href="@{/account/login-page}" class="btn btn-outline-secondary">Ve trang dang nhap</a>
</div>

<th:block th:replace="~{fragments :: appScripts('account-ban')}"></th:block>
</body>
</html>
