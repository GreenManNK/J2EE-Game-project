<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Xác thực email')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-verify')}"></div>

<main class="auth-shell">
  <div class="auth-shell__grid">
    <div class="card theme-box mx-auto mt-5 w-100 auth-card-sm">
      <div class="card-header"><h4 class="mb-0 theme-text">Xác thực email</h4></div>
      <div class="card-body theme-text">
        <form id="verifyForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="code" class="form-label">Mã xác thực</label>
            <input id="code" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Xác thực</button>
        </form>
        <button id="resendCodeBtn" type="button" class="btn btn-outline-secondary w-100 mt-2">Gửi lại mã</button>
        <div id="out" class="small mt-3" role="status" aria-live="polite"></div>
      </div>
    </div>

    <aside class="theme-box auth-side-panel">
      <div class="home-dashboard__eyebrow">
        <i class="bi bi-envelope-check"></i>
        <span>Xác thực email</span>
      </div>
      <h2 class="theme-text mt-2">Hoàn tất kích hoạt tài khoản</h2>
      <p>Nhập email và mã xác thực đã nhận để kích hoạt tài khoản trước khi đăng nhập.</p>
      <ul class="auth-side-list">
        <li><strong>Nếu chưa có mã:</strong> Hãy quay lại trang đăng ký hoặc dùng nút gửi lại mã.</li>
        <li><strong>Mã hết hạn:</strong> Yêu cầu gửi lại mã mới rồi xác thực lại.</li>
      </ul>
    </aside>
  </div>
</main>

<th:block th:replace="~{fragments :: appScripts('account-verify')}"></th:block>
<script th:src="@{/js/account-verify-email.js}"></script>
</body>
</html>
