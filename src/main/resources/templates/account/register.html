<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Đăng ký')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-register')}"></div>

<main class="auth-shell">
  <div class="auth-shell__grid">
    <div class="card theme-box mx-auto mt-5 w-100 auth-card-sm">
      <div class="card-header">
        <h4 class="mb-0 theme-text">Đăng ký tài khoản</h4>
      </div>
      <div class="card-body theme-text">
        <form id="regForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" class="form-control" type="email" placeholder="Nhập email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <div class="input-group">
              <input id="password" class="form-control" type="password" placeholder="Tạo mật khẩu" required>
              <button class="btn btn-outline-secondary" id="toggleRegPasswordBtn" type="button">👁</button>
            </div>
          </div>
          <div class="mb-3">
            <label for="displayName" class="form-label">Tên hiển thị</label>
            <input id="displayName" class="form-control" placeholder="Tên hiển thị" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Gửi mã xác thực</button>
        </form>
        <div class="text-center mt-2">
          <a th:href="@{/account/verify-email-page}" class="btn btn-link">Đã có mã? Xác thực email</a>
        </div>
        <div id="out" class="small mt-3" role="status" aria-live="polite"></div>
      </div>
    </div>

    <aside class="theme-box auth-side-panel">
      <div class="home-dashboard__eyebrow">
        <i class="bi bi-person-plus"></i>
        <span>Tài khoản mới</span>
      </div>
      <h2 class="theme-text mt-2">Tạo tài khoản mới</h2>
      <p>Đăng ký bằng email và xác thực để mở khóa đầy đủ các tính năng của Game Hub.</p>
      <ul class="auth-side-list">
        <li><strong>Bước 1:</strong> Nhập email, mật khẩu và tên hiển thị.</li>
        <li><strong>Bước 2:</strong> Nhận mã xác thực email.</li>
        <li><strong>Bước 3:</strong> Hoàn tất xác thực và đăng nhập.</li>
      </ul>
    </aside>
  </div>
</main>

<th:block th:replace="~{fragments :: appScripts('account-register')}"></th:block>
<script th:src="@{/js/account-register.js}"></script>
<script>
  document.getElementById('toggleRegPasswordBtn')?.addEventListener('click', function () {
    const input = document.getElementById('password');
    if (!input) return;
    const hidden = input.type === 'password';
    input.type = hidden ? 'text' : 'password';
    this.textContent = hidden ? '🙈' : '👁';
  });
</script>
</body>
</html>
