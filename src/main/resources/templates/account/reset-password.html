<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Reset Password')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-reset')}"></div>

<div class="card theme-box mx-auto mt-5" style="max-width: 560px;">
  <div class="card-header"><h4 class="mb-0 theme-text">Dat lai mat khau</h4></div>
  <div class="card-body theme-text">
    <p class="mb-2">Buoc 1: Gui ma reset</p>
    <form id="sendForm" class="mb-4">
      <div class="input-group">
        <input id="email" type="email" class="form-control" placeholder="Nhap email" required>
        <button class="btn btn-outline-primary" type="submit">Gui ma</button>
      </div>
    </form>

    <p class="mb-2">Buoc 2: Xac thuc ma reset + Dat lai mat khau (dung email o tren)</p>
    <form id="resetForm">
      <div class="mb-2"><input id="code" class="form-control" placeholder="Code" required></div>
      <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
        <button id="verifyCodeBtn" class="btn btn-outline-primary" type="button">Verify code</button>
        <small id="verifyCodeStatus" class="text-muted">Chua xac thuc ma</small>
      </div>
      <div class="mb-2"><input id="newPassword" type="password" class="form-control" placeholder="Mat khau moi" required></div>
      <div class="mb-2"><input id="confirmPassword" type="password" class="form-control" placeholder="Xac nhan mat khau" required></div>
      <button id="resetBtn" class="btn btn-success w-100" type="submit" disabled>Reset</button>
    </form>
    <div id="out" class="small mt-3" role="status" aria-live="polite"></div>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('account-reset')}"></th:block>
<script th:src="@{/js/account-reset-password.js}"></script>
</body>
</html>
