<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments :: appShell('leaderboard')}"></div>

<div class="container py-4 theme-text">
  <div class="theme-box rounded p-3 mb-3">
    <h1 class="h3 mb-0 theme-text">Bang xep hang</h1>
  </div>

  <div class="theme-box rounded p-2 table-responsive">
    <table class="table table-bordered table-hover align-middle mb-0">
      <thead>
      <tr class="theme-table-header">
        <th>#</th>
        <th>Name</th>
        <th>Score</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p, i : ${players}">
        <td th:text="${i.count}"></td>
        <td th:text="${p.displayName}"></td>
        <td th:text="${p.score}"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-3">
    <a class="btn theme-outline-btn" th:href="@{/}">Ve Home</a>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('leaderboard')}"></th:block>
</body>
</html>
