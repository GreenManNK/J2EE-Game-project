<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>
<th:block th:fragment="appHead(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' - Caro'">Caro</title>
  <link rel="stylesheet" th:href="@{/lib/bootstrap/dist/css/bootstrap.min.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/site.css}">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body:not(.game-index) { padding-left: 260px; padding-right: 280px; }
    #friendSidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background-color: var(--bg, #fff);
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 1040;
      padding: 90px 10px 10px 10px;
      border-right: 1px solid var(--border-color, #ccc);
    }
    body.sidebar-open #friendSidebar { transform: translateX(0); }
    .sidebar-toggle-btn {
      position: fixed;
      top: 50%;
      left: 0;
      transform: translateY(-50%) translateX(0);
      background-color: #0ff;
      border: none;
      padding: 5px 8px;
      cursor: pointer;
      z-index: 1042;
      border-radius: 0 8px 8px 0;
      transition: all 0.3s ease;
    }
    body.sidebar-open .sidebar-toggle-btn { transform: translateY(-50%) translateX(260px); }
    #friendListInlineContainer {
      position: fixed;
      top: 120px;
      right: 10px;
      width: 260px;
      background-color: var(--bg, #fff);
      border: 1px solid var(--border-color, #ccc);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.85rem;
      max-height: 80vh;
      overflow-y: auto;
      z-index: 1040;
      box-shadow: -2px 0 6px rgba(0, 0, 0, 0.15);
    }
    #backButton { position: fixed; bottom: 10px; left: 10px; z-index: 999; }
  </style>
</th:block>

<div th:fragment="appShell(pageKey)">
  <div id="friendSidebar" class="theme-text">
    <div class="d-flex flex-column gap-2 mb-3 px-1 justify-content-center align-items-center">
      <a class="btn theme-outline-btn w-100 text-start fw-bold theme-text" th:href="@{/}"><i class="bi bi-house-fill me-2"></i> Trang chủ</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" th:href="@{/leaderboard}"><i class="bi bi-bar-chart-fill me-2"></i> Bảng xếp hạng</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" th:href="@{/history}"><i class="bi bi-clock-history me-2"></i> Lịch sử đấu</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" href="/friendship" data-require-user-id="true"><i class="bi bi-people-fill me-2"></i> Bạn bè</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" href="/friendship/notifications" data-require-user-id="true"><i class="bi bi-bell-fill me-2"></i> Thông báo</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" th:href="@{/chat-bot}"><i class="bi bi-robot me-2"></i> Chat Bot</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" th:href="@{/account/login-page}"><i class="bi bi-box-arrow-in-right me-2"></i> Đăng nhập</a>
      <a class="btn theme-outline-btn w-100 text-start theme-text" th:href="@{/account/register-page}"><i class="bi bi-person-plus-fill me-2"></i> Đăng ký</a>
      <form id="friendSearchForm" class="d-flex w-100">
        <input id="friendSearchInput" class="form-control me-2" placeholder="Tìm bạn..." style="border-color: var(--accent, #ccc);">
        <button class="btn theme-outline-btn theme-text" type="submit">Tìm</button>
      </form>
      <small class="text-muted" data-current-user-badge="true">Chua dang nhap</small>
      <button id="toggle-theme" class="btn theme-outline-btn w-100 text-start theme-text"><i class="bi bi-circle-half me-2"></i> Chuyển giao diện</button>
    </div>
  </div>

  <button id="toggleSidebar" class="sidebar-toggle-btn"><i class="bi bi-chevron-double-right"></i></button>

  <div id="friendListInlineContainer" class="theme-box">
    <div class="fw-bold mb-2">Bạn bè</div>
    <div id="friendListContainer" class="small text-muted">Dang tai danh sach ban be...</div>
  </div>

  <a id="backButton" th:if="${pageKey != 'home'}" th:href="@{/}" class="btn btn-outline-secondary">⬅ Quay lại</a>
</div>

<div th:fragment="nav" class="d-flex flex-wrap gap-2 p-2 border-bottom bg-light">
  <a class="btn btn-sm btn-outline-secondary" th:href="@{/}">Home</a>
  <a class="btn btn-sm btn-outline-secondary" th:href="@{/lobby}">Lobby</a>
  <a class="btn btn-sm btn-outline-secondary" th:href="@{/game}">Game</a>
  <a class="btn btn-sm btn-outline-secondary" th:href="@{/leaderboard}">Leaderboard</a>
  <a class="btn btn-sm btn-outline-secondary" th:href="@{/account/login-page}">Login</a>
</div>

<th:block th:fragment="appScripts(pageKey)">
  <script th:src="@{/lib/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script th:src="@{/lib/jquery/dist/jquery.min.js}"></script>
  <script th:src="@{/js/network-health.js}"></script>
  <script th:src="@{/js/site.js}"></script>
  <script th:src="@{/js/app-shell.js}"></script>
  <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", () => {
      const body = document.body;
      const sidebar = document.getElementById("friendSidebar");
      const toggleBtn = document.getElementById("toggleSidebar");
      const icon = toggleBtn?.querySelector("i");
      if (sidebar && toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          const isOpen = body.classList.contains("sidebar-open");
          body.classList.toggle("sidebar-open", !isOpen);
          if (icon) icon.className = isOpen ? "bi bi-chevron-double-right" : "bi bi-chevron-double-left";
        });
      }
      const toggleThemeBtn = document.getElementById("toggle-theme");
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") body.classList.add("dark-mode");
      toggleThemeBtn?.addEventListener("click", () => {
        const isDark = body.classList.toggle("dark-mode");
        localStorage.setItem("theme", isDark ? "dark" : "light");
      });
      const pageKey = /*[[${pageKey}]]*/ 'home';
      if (pageKey === 'game-index') body.classList.add('game-index');
    });
  </script>
</th:block>
</body>
</html>
