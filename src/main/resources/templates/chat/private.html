<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Tin nhan rieng')}"></head>
<body>
<div th:replace="~{fragments :: appShell('chat-private')}"></div>

<main class="private-chat-shell">
  <section class="theme-box private-chat-main" id="privateChatRoot"
           th:if="${success}"
           th:attr="data-current-user-id=${currentUserId},data-friend-id=${friendId},data-current-user-name=${currentUserName},data-friend-name=${friendName},data-room-key=${roomKey}">
    <div class="private-chat-top">
      <div class="private-chat-meta">
        <div class="home-dashboard__eyebrow">
          <i class="bi bi-chat-dots-fill"></i>
          <span>Tin nhan rieng</span>
        </div>
        <h1 class="gx-page-title theme-text mt-2 mb-0">Tin nhan rieng</h1>
        <div class="theme-text"><strong>Ban:</strong> <span th:text="${currentUserName}"></span></div>
        <div class="theme-text"><strong>Ban dang tro chuyen voi:</strong> <span th:text="${friendName}"></span></div>
      </div>
      <div class="private-chat-status-chip">
        <i class="bi bi-broadcast-pin"></i>
        <span>Trang thai: </span><span id="chatStatus">Dang ket noi...</span>
      </div>
    </div>

    <div id="privateChatBox" class="theme-box private-chat-box"></div>
    <div class="private-chat-toolbar">
      <input id="privateMessageInput" class="form-control" placeholder="Nhap tin nhan...">
      <button id="privateSendBtn" class="btn btn-primary">Gui</button>
    </div>
    <div class="gx-inline-actions mt-2">
      <a class="btn theme-outline-btn btn-sm" th:href="@{/}">Trang chu</a>
    </div>
  </section>

  <section class="theme-box gx-section-card" th:if="${success == false}">
    <div class="alert alert-danger mb-2" th:text="${error}">Khong tim thay tai khoan</div>
    <a class="btn theme-outline-btn btn-sm" th:href="@{/}">Trang chu</a>
  </section>
</main>

<th:block th:replace="~{fragments :: appScripts('chat-private')}"></th:block>
<script th:if="${success}" th:inline="javascript">
  window.__privateChatHistory = [[${messages}]];
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
<script>
  (function () {
    const root = document.getElementById('privateChatRoot');
    if (!root) return;

    const currentUserId = root.dataset.currentUserId || '';
    const friendId = root.dataset.friendId || '';
    const currentUserName = root.dataset.currentUserName || currentUserId;
    const friendName = root.dataset.friendName || friendId;
    const roomKey = root.dataset.roomKey || (currentUserId <= friendId
      ? (currentUserId + '__' + friendId)
      : (friendId + '__' + currentUserId));

    const statusEl = document.getElementById('chatStatus');
    const chatBox = document.getElementById('privateChatBox');
    const input = document.getElementById('privateMessageInput');
    const sendBtn = document.getElementById('privateSendBtn');
    let connected = false;
    const initialHistory = Array.isArray(window.__privateChatHistory) ? window.__privateChatHistory : [];

    function appendMessage(sender, text, isMine, sentAt) {
      const row = document.createElement('div');
      row.className = 'mb-2 p-2 rounded ' + (isMine ? 'bg-primary text-white ms-auto' : 'bg-light text-dark me-auto');
      row.style.maxWidth = '80%';

      const senderEl = document.createElement('div');
      senderEl.className = 'fw-bold small';
      senderEl.textContent = sender;
      row.appendChild(senderEl);

      const textEl = document.createElement('div');
      textEl.textContent = text;
      row.appendChild(textEl);

      if (sentAt) {
        const timeEl = document.createElement('div');
        timeEl.className = 'small opacity-75';
        timeEl.textContent = new Date(sentAt).toLocaleTimeString();
        row.appendChild(timeEl);
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'd-flex ' + (isMine ? 'justify-content-end' : 'justify-content-start');
      wrapper.appendChild(row);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    initialHistory.forEach((item) => {
      appendMessage(
        item.senderName || item.fromUserId || friendName,
        item.message || '',
        item.fromUserId === currentUserId,
        item.sentAt
      );
    });

    const client = new window.StompJs.Client({
      webSocketFactory: () => new SockJS(window.CaroUrl.path('/ws')),
      reconnectDelay: 3000,
      onConnect: () => {
        connected = true;
        statusEl.textContent = 'Da ket noi';
        client.subscribe('/topic/private.' + roomKey, (message) => {
          const payload = JSON.parse(message.body || '{}');
          if (payload.type === 'ERROR') {
            if (!payload.userId || payload.userId === currentUserId) {
              statusEl.textContent = payload.error || 'Khong gui duoc tin nhan';
            }
            return;
          }
          if (payload.type !== 'PRIVATE_CHAT' || payload.roomKey !== roomKey) return;
          appendMessage(
            payload.senderName || payload.fromUserId || friendName,
            payload.message || '',
            payload.fromUserId === currentUserId,
            payload.sentAt
          );
        });
      },
      onStompError: () => {
        connected = false;
        statusEl.textContent = 'Loi STOMP';
      },
      onWebSocketClose: () => {
        connected = false;
        statusEl.textContent = 'Mat ket noi - dang thu lai...';
      },
      onWebSocketError: () => {
        connected = false;
        statusEl.textContent = 'Loi WebSocket';
      }
    });

    function sendMessage() {
      const text = (input.value || '').trim();
      if (!text || !connected) return;
      client.publish({
        destination: '/app/private-chat.send',
        body: JSON.stringify({
          currentUserId,
          friendId,
          senderName: currentUserName,
          content: text
        })
      });
      input.value = '';
    }

    sendBtn?.addEventListener('click', sendMessage);
    input?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    client.activate();
  })();
</script>
</body>
</html>
