<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><title>Manager Users</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container">
<h1>Manager - Users</h1>
<form method="get" th:action="@{/manager/users}">
  <input name="searchTerm" placeholder="search" th:value="${searchTerm}">
  <input type="hidden" name="size" th:value="${size}">
  <select name="banFilter">
    <option value="" th:selected="${banFilter==''}">All</option>
    <option value="banned" th:selected="${banFilter=='banned'}">Banned</option>
    <option value="active" th:selected="${banFilter=='active'}">Active</option>
  </select>
  <button type="submit">Filter</button>
</form>
<p class="muted">Total: <span th:text="${totalItems}"></span></p>
<div class="pager">
  <a th:if="${page > 0}" th:href="@{/manager/users(searchTerm=${searchTerm},banFilter=${banFilter},page=${page-1},size=${size})}">Prev</a>
  <span>Page <span th:text="${page+1}"></span>/<span th:text="${totalPages}"></span></span>
  <a th:if="${page+1 < totalPages}" th:href="@{/manager/users(searchTerm=${searchTerm},banFilter=${banFilter},page=${page+1},size=${size})}">Next</a>
</div>
<table border="1" cellpadding="6">
  <tr><th>ID</th><th>Email</th><th>Name</th><th>Score</th><th>Role</th></tr>
  <tr th:each="u : ${users}">
    <td th:text="${u.id}"></td><td th:text="${u.email}"></td><td th:text="${u.displayName}"></td>
    <td th:text="${u.score}"></td><td th:text="${u.role}"></td>
  </tr>
</table>
<a th:href="@{/}">Home</a>
</div>
</body></html>
