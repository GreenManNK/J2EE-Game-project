<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Manager Users')}"></head>
<body>
<div th:replace="~{fragments :: appShell('manager-users')}"></div>

<div class="container-fluid py-4 theme-text">
  <div class="theme-box rounded p-3 mb-3">
    <h1 class="h3 mb-0 theme-text">Manager - Users</h1>
  </div>

  <form method="get" th:action="@{/manager/users}" class="theme-box rounded p-3 mb-3">
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label" for="searchTerm">Search</label>
        <input id="searchTerm" class="form-control" name="searchTerm" placeholder="Search user" th:value="${searchTerm}">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="banFilter">Ban filter</label>
        <select id="banFilter" class="form-select" name="banFilter">
          <option value="" th:selected="${banFilter==''}">All</option>
          <option value="banned" th:selected="${banFilter=='banned'}">Banned</option>
          <option value="active" th:selected="${banFilter=='active'}">Active</option>
        </select>
      </div>
      <div class="col-md-2">
        <input type="hidden" name="size" th:value="${size}">
        <button type="submit" class="btn btn-primary w-100">Filter</button>
      </div>
      <div class="col-md-2 text-md-end">
        <small class="text-muted">Total: <span th:text="${totalItems}"></span></small>
      </div>
    </div>
  </form>

  <div class="theme-box rounded p-3 mb-3">
    <h2 class="h5 mb-3 theme-text">Create User</h2>
    <form id="managerCreateUserForm" class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label" for="createEmail">Email</label>
        <input id="createEmail" class="form-control" type="email" required>
      </div>
      <div class="col-md-3">
        <label class="form-label" for="createDisplayName">Name</label>
        <input id="createDisplayName" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label" for="createPassword">Password</label>
        <input id="createPassword" class="form-control" type="password" required>
      </div>
      <div class="col-md-2">
        <label class="form-label" for="createScore">Score</label>
        <input id="createScore" class="form-control" type="number" value="0">
      </div>
      <div class="col-12">
        <label class="form-label" for="createAvatarPath">Avatar Path</label>
        <input id="createAvatarPath" class="form-control" placeholder="/uploads/avatars/default-avatar.jpg">
      </div>
      <div class="col-12 d-flex flex-wrap gap-2 align-items-center">
        <button type="submit" class="btn btn-primary">Create</button>
        <small class="text-muted">Manager chi tao tai khoan role `User`.</small>
        <div id="managerCreateUserOut" class="small mb-0 theme-text flex-grow-1" role="status" aria-live="polite"></div>
      </div>
    </form>
  </div>

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3 theme-text">
    <a class="btn btn-sm btn-outline-secondary"
       th:if="${page > 0}"
       th:href="@{/manager/users(searchTerm=${searchTerm},banFilter=${banFilter},page=${page-1},size=${size})}">Prev</a>
    <span class="small">Page <span th:text="${page+1}"></span>/<span th:text="${totalPages}"></span></span>
    <a class="btn btn-sm btn-outline-secondary"
       th:if="${page+1 < totalPages}"
       th:href="@{/manager/users(searchTerm=${searchTerm},banFilter=${banFilter},page=${page+1},size=${size})}">Next</a>
  </div>

  <div class="theme-box rounded p-2 table-responsive">
    <table class="table table-bordered table-hover align-middle mb-0">
      <thead>
      <tr class="theme-table-header">
        <th>ID</th>
        <th>Email</th>
        <th>Name</th>
        <th>Score</th>
        <th>Role</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.displayName}"></td>
        <td th:text="${u.score}"></td>
        <td th:text="${u.role}"></td>
        <td>
          <a class="btn btn-sm btn-outline-primary" th:href="@{/manager/users/{id}(id=${u.id})}">Detail</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-3">
    <a class="btn theme-outline-btn" th:href="@{/}">Home</a>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('manager-users')}"></th:block>
<script th:src="@{/js/manager-users.js}"></script>
</body>
</html>
