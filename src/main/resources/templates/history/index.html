<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('History')}"></head>
<body>
<div th:replace="~{fragments :: appShell('history')}"></div>

<div class="container-fluid py-4 theme-text">
  <div class="theme-box rounded p-3 mb-3">
    <h1 class="h3 mb-3 theme-text">Lich su dau</h1>
    <form method="get" th:action="@{/history}" class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label" for="userId">User ID</label>
        <input id="userId" class="form-control" name="userId" th:value="${userId}">
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Xem lich su</button>
      </div>
    </form>
    <p class="mt-3 mb-0">User ID: <strong th:text="${userId}"></strong></p>
  </div>

  <p class="theme-text" th:if="${#lists.isEmpty(histories)}">Chua co du lieu lich su.</p>

  <div class="theme-box rounded p-2 table-responsive" th:if="${!#lists.isEmpty(histories)}">
    <table class="table table-bordered table-hover align-middle mb-0">
      <thead>
      <tr class="theme-table-header">
        <th>GameCode</th>
        <th>P1</th>
        <th>P2</th>
        <th>First</th>
        <th>Moves</th>
        <th>Winner</th>
        <th>Result</th>
        <th>At</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="h : ${histories}">
        <td th:text="${h.gameCode}"></td>
        <td th:text="${h.player1Name}"></td>
        <td th:text="${h.player2Name}"></td>
        <td th:text="${h.firstPlayerName}"></td>
        <td th:text="${h.totalMoves}"></td>
        <td th:text="${h.winnerName}"></td>
        <td th:text="${h.result}"></td>
        <td th:text="${h.playedAt}"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-3">
    <a class="btn theme-outline-btn" th:href="@{/}">Ve Home</a>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('history')}"></th:block>
</body>
</html>
