<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('History')}"></head>
<body>
<div th:replace="~{fragments :: appShell('history')}"></div>

<main class="gx-page-shell theme-text">
  <section class="gx-page-hero theme-box">
    <div class="gx-page-hero__head">
      <div>
        <div class="home-dashboard__eyebrow">
          <i class="bi bi-clock-history"></i>
          <span>Match History</span>
        </div>
        <h1 class="gx-page-title theme-text mt-2">Lich su dau</h1>
        <p class="gx-page-subtitle">Tra cuu tran dau theo nguoi choi, xem ket qua, luot di va thoi diem choi.</p>
      </div>
      <div class="gx-page-badge">
        <i class="bi bi-person-badge"></i>
        <span th:text="${(userId != null and !#strings.isEmpty(userId)) ? userId : 'Chua chon user'}">Chua chon user</span>
      </div>
    </div>
    <form method="get" th:action="@{/history}" class="row g-2 align-items-end">
      <div class="col-12 col-md-5 col-lg-4">
        <label class="form-label" for="userId">User ID</label>
        <input id="userId" class="form-control" name="userId" th:value="${userId}" placeholder="Nhap user id de loc">
      </div>
      <div class="col-12 col-md-3 col-lg-2">
        <button type="submit" class="btn btn-primary w-100">Xem lich su</button>
      </div>
    </form>
  </section>

  <div class="gx-empty-state" th:if="${#lists.isEmpty(histories)}">Chua co du lieu lich su.</div>

  <section class="gx-section-card theme-box gx-table-card" th:if="${!#lists.isEmpty(histories)}">
    <div class="gx-section-card__head">
      <h2 class="gx-section-card__title theme-text mb-0">Danh sach tran dau</h2>
      <div class="gx-section-card__meta" th:text="${#lists.size(histories)} + ' ban ghi'">0 ban ghi</div>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle mb-0">
        <thead>
        <tr class="theme-table-header">
          <th>GameCode</th>
          <th>P1</th>
          <th>P2</th>
          <th>First</th>
          <th>Moves</th>
          <th>Winner</th>
          <th>Result</th>
          <th>At</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="h : ${histories}">
          <td th:text="${h.gameCode}"></td>
          <td th:text="${h.player1Name}"></td>
          <td th:text="${h.player2Name}"></td>
          <td th:text="${h.firstPlayerName}"></td>
          <td th:text="${h.totalMoves}"></td>
          <td th:text="${h.winnerName}"></td>
          <td th:text="${h.result}"></td>
          <td th:text="${h.playedAt}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div class="gx-inline-actions">
    <a class="btn theme-outline-btn" th:href="@{/}">Ve Home</a>
  </div>
</main>

<th:block th:replace="~{fragments :: appScripts('history')}"></th:block>
</body>
</html>
