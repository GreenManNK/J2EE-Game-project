<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Caro Offline')}"></head>
<body>
<div th:replace="~{fragments :: appShell('game-offline')}"></div>

<div class="text-center mt-4">
  <h1 class="theme-text">Che do choi Offline</h1>
  <p id="turnStatus" class="theme-text">Luot cua: X</p>
  <div class="d-flex justify-content-center gap-2 mb-2">
    <button id="offlineResetBtn" class="btn btn-outline-warning btn-sm" type="button">Choi lai</button>
    <button id="offlineSurrenderBtn" class="btn btn-outline-danger btn-sm" type="button">Dau hang</button>
    <a th:href="@{/games/caro}" class="btn btn-outline-secondary btn-sm">Che do Caro</a>
  </div>
</div>

<div class="d-flex justify-content-center">
  <div id="game-board"></div>
</div>

<style>
  #game-board { margin-top: 20px; width: fit-content; max-width: calc(100vw - 16px); }
  .row { display: flex; }
  .cell {
    --cell-size: 50px;
    width: var(--cell-size);
    height: var(--cell-size);
    border: 1px solid var(--cell-border-color, black);
    text-align: center;
    font-size: 24px;
    cursor: pointer;
    line-height: var(--cell-size);
    color: var(--cell-text-color, black);
  }
  .cell.win { background: rgba(255, 193, 7, 0.3); }
  .cell.last-move { box-shadow: inset 0 0 0 2px rgba(13, 202, 240, 0.9); }
  .player-x { color: #00aaff; font-weight: bold; }
  .player-o { color: #ff6666; font-weight: bold; }
  body.dark-mode .cell { --cell-border-color: white; --cell-text-color: white; }
  body:not(.dark-mode) .cell { --cell-border-color: black; --cell-text-color: black; }

  @media (max-width: 575.98px) {
    .cell {
      --cell-size: clamp(28px, 9.2vw, 40px);
      font-size: clamp(14px, 4.5vw, 18px);
    }
  }
</style>

<th:block th:replace="~{fragments :: appScripts('game-offline')}"></th:block>
<script th:src="@{/js/offline.js}"></script>
</body>
</html>
