<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Caro Offline')}"></head>
<body>
<div th:replace="~{fragments :: appShell('game-offline')}"></div>

<div class="text-center mt-4">
  <h1 class="theme-text">Che do choi Offline</h1>
  <p id="turnStatus" class="theme-text">Luot cua: X</p>
</div>

<div class="d-flex justify-content-center">
  <div id="game-board"></div>
</div>

<style>
  #game-board { margin-top: 20px; width: fit-content; }
  .row { display: flex; }
  .cell {
    width: 50px;
    height: 50px;
    border: 1px solid var(--cell-border-color, black);
    text-align: center;
    font-size: 24px;
    cursor: pointer;
    line-height: 50px;
    color: var(--cell-text-color, black);
  }
  .player-x { color: #00aaff; font-weight: bold; }
  .player-o { color: #ff6666; font-weight: bold; }
  body.dark-mode .cell { --cell-border-color: white; --cell-text-color: white; }
  body:not(.dark-mode) .cell { --cell-border-color: black; --cell-text-color: black; }
</style>

<th:block th:replace="~{fragments :: appScripts('game-offline')}"></th:block>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const board = document.getElementById('game-board');
    let currentPlayer = 'X';

    function updateStatus() {
      document.getElementById('turnStatus').textContent = 'Luot cua: ' + currentPlayer;
    }

    function handleClick(cell) {
      if (cell.textContent !== '') return;
      cell.textContent = currentPlayer;
      cell.classList.add(currentPlayer === 'X' ? 'player-x' : 'player-o');
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus();
    }

    for (let i = 0; i < 11; i++) {
      const row = document.createElement('div');
      row.classList.add('row');
      for (let j = 0; j < 11; j++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.onclick = () => handleClick(cell);
        row.appendChild(cell);
      }
      board.appendChild(row);
    }

    updateStatus();
  });
</script>
</body>
</html>
