<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Dang cho doi thu')}"></head>
<body>
<div th:replace="~{fragments :: appShell('game-waiting')}"></div>

<main class="waiting-page-shell theme-text">
  <section class="gx-page-hero theme-box text-center">
    <div class="home-dashboard__eyebrow mx-auto">
      <i class="bi bi-hourglass-split"></i>
      <span>Matchmaking / Waiting</span>
    </div>
    <h2 class="gx-page-title fw-bold mb-0">Dang cho doi thu phan hoi...</h2>
    <p class="gx-page-subtitle mx-auto mb-0">He thong se tu dong huy loi moi neu qua thoi gian cho quy dinh.</p>
  </section>

  <section class="card shadow-sm theme-box waiting-request-card">
    <div class="card-body text-center">
      <div class="gx-chip-row justify-content-center mb-2">
        <span class="gx-chip"><i class="bi bi-hash"></i> Ma yeu cau: <strong th:text="${requestId}">id</strong></span>
      </div>
      <div class="mt-2 fs-5 theme-text">He thong se huy loi moi sau <strong id="countdown">30</strong>s</div>
      <div class="mt-2 text-muted">Vui long cho phan hoi tu doi thu...</div>

      <div class="progress waiting-progress mt-3" role="progressbar" aria-label="Countdown" aria-valuemin="0" aria-valuemax="30">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
  </section>
</main>

<th:block th:replace="~{fragments :: appScripts('game-waiting')}"></th:block>
<script>
  let countdown = 30;
  const countdownEl = document.getElementById('countdown');
  const progressEl = document.getElementById('progressBar');

  const timer = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    progressEl.style.width = (countdown / 30 * 100) + '%';

    if (countdown <= 0) {
      clearInterval(timer);
      Swal.fire('Doi thu khong phan hoi', 'Ban se duoc quay lai sanh', 'info').then(() => {
        window.location.href = window.CaroUrl.path('/lobby');
      });
    }
  }, 1000);
</script>
</body>
</html>
