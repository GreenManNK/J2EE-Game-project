<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments :: appHead('Tim kiem ban be')}"></head>
<body>
<div th:replace="~{fragments :: appShell('friend-search')}"></div>

<div class="container mt-4">
  <h1>Ket qua tim kiem</h1>
  <p>Tu khoa: <strong th:text="${query}"></strong></p>

  <h3>Khop chinh xac</h3>
  <div class="list-group mb-4">
    <div class="list-group-item d-flex justify-content-between align-items-center" th:each="u : ${exactMatches}">
      <span th:text="${u.displayName + ' - ' + u.email}"></span>
      <a class="btn btn-sm btn-outline-primary" th:href="@{/friendship/user-detail/{id}(id=${u.id}, currentUserId=${currentUserId})}">Xem</a>
    </div>
    <div class="text-muted" th:if="${#lists.isEmpty(exactMatches)}">Khong co ket qua khop chinh xac.</div>
  </div>

  <h3>Khop tuong tu</h3>
  <div class="list-group">
    <div class="list-group-item d-flex justify-content-between align-items-center" th:each="u : ${similarMatches}">
      <span th:text="${u.displayName + ' - ' + u.email}"></span>
      <a class="btn btn-sm btn-outline-primary" th:href="@{/friendship/user-detail/{id}(id=${u.id}, currentUserId=${currentUserId})}">Xem</a>
    </div>
    <div class="text-muted" th:if="${#lists.isEmpty(similarMatches)}">Khong co ket qua tuong tu.</div>
  </div>

  <a class="btn btn-link mt-3" th:href="@{/friendship(currentUserId=${currentUserId})}">Quay lai trang ban be</a>
</div>

<th:block th:replace="~{fragments :: appScripts('friend-search')}"></th:block>
</body>
</html>
