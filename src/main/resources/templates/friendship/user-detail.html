<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('User Detail')}"></head>
<body>
<div th:replace="~{fragments :: appShell('friendship-user-detail')}"></div>

<div class="container py-4 theme-text"
     id="friendshipUserDetailRoot"
     th:attr="data-target-user-id=${user.id},data-current-user-id=${currentUserId},data-is-friend=${isFriend},data-has-pending=${hasPending},data-is-owner=${isOwner}">
  <div class="theme-box rounded p-3 mb-3">
    <h1 class="h3 mb-3 theme-text">User Detail</h1>
    <div class="row g-2">
      <div class="col-md-6"><strong>Name:</strong> <span th:text="${user.displayName}"></span></div>
      <div class="col-md-6"><strong>Email:</strong> <span th:text="${user.email}"></span></div>
      <div class="col-md-6"><strong>Score:</strong> <span th:text="${user.score}"></span></div>
      <div class="col-md-6"><strong>Friend Status:</strong>
        <span th:if="${isFriend}">Ban be</span>
        <span th:if="${!isFriend and hasPending}">Dang cho xu ly loi moi</span>
        <span th:if="${!isFriend and !hasPending}">Chua ket ban</span>
      </div>
      <div class="col-md-6" th:if="${isOwner}">
        <strong>Ghi chu:</strong> Day la ho so cua ban
      </div>
    </div>
    <div class="mt-3 d-flex flex-wrap gap-2">
      <button id="friendRelationBtn"
              type="button"
              class="btn btn-primary"
              th:if="${!isOwner and currentUserId != null and !#strings.isEmpty(currentUserId)}"
              th:text="${isFriend} ? 'Huy ket ban' : (${hasPending} ? 'Xem thong bao loi moi' : 'Gui loi moi ket ban')">
        Gui loi moi ket ban
      </button>
      <a class="btn btn-outline-primary"
         th:if="${isOwner and currentUserId != null and !#strings.isEmpty(currentUserId)}"
         th:href="@{/profile(userId=${user.id})}">Mo trang ho so cua toi</a>
      <a class="btn theme-outline-btn"
         th:if="${isFriend and currentUserId != null and !#strings.isEmpty(currentUserId)}"
         th:href="@{/chat/private(currentUserId=${currentUserId},friendId=${user.id})}">Chat rieng</a>
      <a class="btn btn-outline-secondary" th:href="@{/friendship(currentUserId=${currentUserId})}">Back Friendship</a>
    </div>
    <div id="friendshipUserDetailOut" class="small mt-3 mb-0 theme-text" role="status" aria-live="polite"></div>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('friendship-user-detail')}"></th:block>
<script th:src="@{/js/friendship-user-detail.js}"></script>
</body>
</html>
