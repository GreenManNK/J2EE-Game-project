<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Notifications')}"></head>
<body>
<div th:replace="~{fragments :: appShell('friendship-notifications')}"></div>

<div class="container py-4 theme-text"
     id="friendshipNotificationsRoot"
     th:attr="data-current-user-id=${currentUserId}">
  <h1 class="h3 mb-3 theme-text">Notifications</h1>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Friend Requests</h2>
        <ul class="list-group" id="friendRequestList">
          <li class="list-group-item d-flex flex-wrap justify-content-between align-items-center gap-2"
              th:each="f : ${friendRequestViews}"
              th:attr="data-friendship-id=${f.friendshipId}">
            <div class="d-flex align-items-center gap-2 flex-grow-1">
              <img th:src="@{${f.requesterAvatarPath}}"
                   alt="avatar"
                   width="32"
                   height="32"
                   class="rounded-circle border">
              <div class="small">
                <div class="fw-semibold" th:text="${f.requesterName}">Requester</div>
                <div class="text-muted" th:text="${f.requesterEmail}">email@example.com</div>
              </div>
            </div>
            <span class="d-flex gap-2">
              <a class="btn btn-sm btn-outline-primary"
                 th:href="@{/friendship/user-detail/{id}(id=${f.requesterId},currentUserId=${currentUserId})}">Xem</a>
              <button class="accept btn btn-sm btn-success" type="button" th:attr="data-id=${f.friendshipId}">Accept</button>
              <button class="decline btn btn-sm btn-outline-secondary" type="button" th:attr="data-id=${f.friendshipId}">Decline</button>
            </span>
          </li>
        </ul>
        <div id="friendRequestEmptyState" class="text-muted small mt-2" th:if="${#lists.isEmpty(friendRequestViews)}">Khong co loi moi ket ban.</div>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Achievement</h2>
        <ul class="list-group">
          <li class="list-group-item" th:each="a : ${achievementNotifications}" th:text="${a.achievementName + ' - ' + a.createdAt}"></li>
        </ul>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">System</h2>
        <ul class="list-group">
          <li class="list-group-item" th:each="s : ${systemNotifications}" th:text="${s.content + ' - ' + s.createdAt}"></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <a class="btn theme-outline-btn" th:href="@{/friendship(currentUserId=${currentUserId})}">Back Friendship</a>
  </div>
  <div id="friendshipNotificationsOut" class="small mt-3 mb-0 theme-text" role="status" aria-live="polite"></div>
</div>

<th:block th:replace="~{fragments :: appScripts('friendship-notifications')}"></th:block>
<script th:src="@{/js/friendship-notifications.js}"></script>
</body>
</html>
