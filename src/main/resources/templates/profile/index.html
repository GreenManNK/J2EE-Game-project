<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Profile')}"></head>
<body>
<div th:replace="~{fragments :: appShell('profile')}"></div>

<div class="container py-4 theme-text">
  <div class="theme-box rounded p-3 mb-3">
    <h1 class="h3 mb-3 theme-text">Profile</h1>
    <div class="row g-2">
      <div class="col-md-6"><strong>User:</strong> <span th:text="${user.displayName}"></span></div>
      <div class="col-md-6"><strong>Email:</strong> <span th:text="${user.email}"></span></div>
      <div class="col-md-4"><strong>Score:</strong> <span th:text="${user.score}"></span></div>
      <div class="col-md-4"><strong>WinRate:</strong> <span th:text="${winRate}"></span>%</div>
      <div class="col-md-4"><strong>Total Games:</strong> <span th:text="${totalGames}"></span></div>
      <div class="col-md-4"><strong>Win Count:</strong> <span th:text="${winCount}"></span></div>
      <div class="col-md-4"><strong>Rank:</strong> <span th:text="${rank}"></span></div>
      <div class="col-md-4"><strong>Best Streak:</strong> <span th:text="${bestStreak}"></span></div>
      <div class="col-md-4"><strong>Win Fast Ranked:</strong> <span th:text="${winFastRanked}"></span></div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Danh hieu</h2>
        <ul class="list-group">
          <li class="list-group-item" th:each="d : ${danhHieu}" th:text="${d}"></li>
        </ul>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Diem Achievements</h2>
        <ul class="list-group">
          <li class="list-group-item" th:each="a : ${diemAchievements}" th:text="${a}"></li>
        </ul>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Locked</h2>
        <ul class="list-group">
          <li class="list-group-item" th:each="a : ${lockedAchievements}" th:text="${a}"></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-lg-6">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Achievement Lap Lai</h2>
        <ul class="list-group" th:if="${!#maps.isEmpty(repeatAchievements)}">
          <li class="list-group-item"
              th:each="entry : ${repeatAchievements}"
              th:text="${entry.key + ' x' + entry.value}"></li>
        </ul>
        <div class="text-muted small" th:if="${#maps.isEmpty(repeatAchievements)}">Chua co.</div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="theme-box rounded p-3 h-100">
        <h2 class="h5 theme-text">Achievement Dac Biet</h2>
        <ul class="list-group" th:if="${!#lists.isEmpty(achievements)}">
          <li class="list-group-item" th:each="a : ${achievements}" th:text="${a}"></li>
        </ul>
        <div class="text-muted small" th:if="${#lists.isEmpty(achievements)}">Chua co.</div>
      </div>
    </div>
  </div>

  <div class="theme-box rounded p-3 mt-3"
       th:if="${isOwner}"
       id="profileOwnerRoot"
       th:attr="data-user-id=${user.id}">
    <h2 class="h5 mb-3 theme-text">Cap nhat thong tin</h2>
    <form id="editProfileForm" class="row g-3">
      <div class="col-md-4">
        <label class="form-label" for="displayName">Display Name</label>
        <input id="displayName" class="form-control" th:value="${user.displayName}">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-control" type="email" th:value="${user.email}">
      </div>
      <div class="col-md-4">
        <label class="form-label" for="avatarPath">Avatar Path</label>
        <input id="avatarPath" class="form-control" th:value="${user.avatarPath}">
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Luu thay doi</button>
      </div>
    </form>

    <h2 class="h5 mt-4 mb-3 theme-text">Doi mat khau</h2>
    <form id="changePasswordForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="currentPassword">Mat khau hien tai</label>
        <input id="currentPassword" class="form-control" type="password" required>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="newPassword">Mat khau moi</label>
        <input id="newPassword" class="form-control" type="password" required>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-outline-primary">Doi mat khau</button>
      </div>
    </form>

    <div id="ownerOut" class="small mt-3 mb-0 theme-text" role="status" aria-live="polite"></div>
  </div>

  <div class="mt-3">
    <a class="btn theme-outline-btn" th:href="@{/}">Ve Home</a>
  </div>
</div>

<th:block th:replace="~{fragments :: appScripts('profile')}"></th:block>
<script>
  (function () {
    const root = document.getElementById('profileOwnerRoot');
    if (!root) return;
    const appPath = (window.CaroUrl && typeof window.CaroUrl.path === 'function')
      ? window.CaroUrl.path
      : (value) => value;
    const ui = window.CaroUi || {};
    const userId = root.dataset.userId;
    const out = document.getElementById('ownerOut');
    const editForm = document.getElementById('editProfileForm');
    const pwdForm = document.getElementById('changePasswordForm');

    function setStatus(message, ok) {
      if (ui.setStatus) {
        ui.setStatus(out, message, ok);
      } else if (out) {
        out.textContent = String(message || '');
      }
    }

    function report(data, successMessage) {
      if (ui.apiResult) {
        return ui.apiResult(data, { statusEl: out, successMessage });
      }
      const ok = !!(data && data.success);
      setStatus(ok ? successMessage : String(data?.error || data?.message || 'Thao tac that bai'), ok);
      return ok;
    }

    function reportError(err) {
      const message = String(err?.message || err || 'Request failed');
      setStatus(message, false);
      ui.toast?.(message, { type: 'danger' });
    }

    editForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        userId,
        displayName: document.getElementById('displayName')?.value || '',
        email: document.getElementById('email')?.value || '',
        avatarPath: document.getElementById('avatarPath')?.value || ''
      };
      try {
        const res = await fetch(appPath('/profile'), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        const ok = report(data, 'Cap nhat ho so thanh cong');
        if (ok && window.CaroUser) {
          const current = window.CaroUser.get() || { userId: userId };
          window.CaroUser.set({
            userId: userId,
            displayName: data.user?.displayName || payload.displayName || current.displayName,
            email: data.user?.email || payload.email || current.email,
            role: current.role || 'User',
            avatarPath: data.user?.avatarPath || payload.avatarPath || current.avatarPath
          });
        }
      } catch (err) {
        reportError(err);
      }
    });

    pwdForm?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        userId,
        currentPassword: document.getElementById('currentPassword')?.value || '',
        newPassword: document.getElementById('newPassword')?.value || ''
      };
      try {
        const res = await fetch(appPath('/account/change-password'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        const ok = report(data, 'Doi mat khau thanh cong');
        if (ok) {
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
        }
      } catch (err) {
        reportError(err);
      }
    });
  })();
</script>
</body>
</html>
