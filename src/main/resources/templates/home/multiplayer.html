<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Multiplayer')}"></head>
<body>
<div th:replace="~{fragments :: appShell('multiplayer')}"></div>

<div class="container text-center mt-5">
  <h1 class="display-4 mb-4 theme-text fw-bold" style="text-shadow: 2px 2px 0 #000, 4px 4px 0 #0ff;">
    CHE DO NHIEU NGUOI CHOI (CARO)
  </h1>
  <p class="theme-text mb-3 fs-5">Che do choi:</p>
  <div class="mode-menu d-flex flex-column align-items-center gap-3">
    <a th:href="@{/lobby}" class="btn theme-outline-btn btn-lg w-50">Online</a>
    <a th:href="@{/game/offline}" class="btn theme-outline-btn btn-lg w-50">Offline</a>
  </div>
  <p class="theme-text mt-3 mb-0">
    Ban co the choi Online voi tu cach khach (khong can dang nhap).
  </p>
  <p class="theme-text mt-2 mb-0">
    Muon xem cac game khac? <a th:href="@{/games}" class="theme-text fw-bold">Mo Thu vien game</a>
  </p>
</div>

<style>
  .mode-menu {
    width: min(100%, 520px);
    margin: 0 auto;
  }
  .mode-menu > .btn {
    width: min(420px, 100%) !important;
  }
</style>

<th:block th:replace="~{fragments :: appScripts('multiplayer')}"></th:block>
</body>
</html>
