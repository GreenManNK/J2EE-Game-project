<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Single Player')}"></head>
<body>
<div th:replace="~{fragments :: appShell('single-player')}"></div>

<main class="mode-page-shell">
  <section class="mode-page-card theme-box text-center">
    <div class="home-dashboard__eyebrow">
      <i class="bi bi-cpu"></i>
      <span>Caro / Solo</span>
    </div>
    <h1 class="mode-page-title theme-text mt-2">Che do mot nguoi choi</h1>
    <p class="mode-page-subtitle theme-text">Chon cap do bot phu hop de luyen tap hoac thu suc voi AI.</p>

    <div class="mode-menu d-flex flex-column align-items-center gap-3">
      <a th:href="@{/bot/easy}" class="btn theme-outline-btn btn-lg w-50">Bot De</a>
      <a th:href="@{/bot/hard}" class="btn theme-outline-btn btn-lg w-50">Bot Kho</a>
    </div>

    <div class="mode-page-links">
      Muon xem cac game khac? <a th:href="@{/games}" class="theme-text fw-bold">Mo Thu vien game</a>
    </div>
  </section>
</main>

<th:block th:replace="~{fragments :: appScripts('single-player')}"></th:block>
</body>
</html>
