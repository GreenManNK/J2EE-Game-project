<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Trang chính')}"></head>
<body>
<div th:replace="~{fragments :: appShell('home')}"></div>

<main role="main" id="homeMain" class="transition-margin px-4" style="min-height: 80vh; padding-top: 3rem;">
  <h2 class="mb-3 text-center theme-text fw-bold" style="text-shadow: 2px 2px 0 #000, 4px 4px 0 #0ff;">
    CHAO MUNG BAN DEN VOI CARO.IO
  </h2>

  <div class="home-main-actions d-flex justify-content-center mb-3 gap-2 flex-wrap">
    <a th:href="@{/multiplayer}" class="btn theme-outline-btn btn-lg">Multiplayer</a>
    <a th:href="@{/single-player}" class="btn theme-outline-btn btn-lg">Single Player</a>
  </div>

  <div class="mb-3">
    <h5 class="mb-2 theme-text text-center">Dang bai viet moi</h5>
    <form id="postForm">
      <div class="card shadow-sm px-3 py-2 mx-auto" style="max-width: 900px;">
        <textarea id="postContent" class="form-control mb-2" rows="3" placeholder="Ban dang nghi gi?" required></textarea>
        <div class="d-flex justify-content-between align-items-center">
          <small class="text-muted">Tac gia: <span id="postAuthorLabel">Can dang nhap</span></small>
          <button type="submit" class="btn theme-outline-btn btn-sm">Dang bai</button>
        </div>
      </div>
    </form>
  </div>

  <div class="mx-auto" style="max-width: 900px;">
    <h5 class="mb-2 theme-text">Bang tin</h5>
    <div style="max-height: 600px; overflow-y: auto;" class="scroll-posts">
      <p class="text-muted" th:if="${#lists.isEmpty(posts)}">Chua co bai dang nao.</p>
      <div class="card mb-3 shadow-sm" th:each="p : ${posts}">
        <div class="card-body py-2 px-3 text-start">
          <div class="d-none post-id" th:text="${p.id}">0</div>
          <div class="mb-1">
            <strong class="theme-text" th:text="${p.author}">author</strong><br>
            <small class="text-muted" th:text="${p.createdAt}">time</small>
          </div>
          <p class="theme-text mb-2" th:text="${p.content}">content</p>
          <img th:if="${p.imagePath != null and !#strings.isEmpty(p.imagePath)}" th:src="${p.imagePath}" class="img-fluid rounded mb-2" style="max-height: 300px;" alt="post-image">

          <div class="mt-2">
            <div class="small fw-bold theme-text mb-1">Binh luan</div>
            <div class="ps-2 border-start" th:if="${#lists.isEmpty(p.comments)}">
              <small class="text-muted">Chua co binh luan</small>
            </div>
            <div class="ps-2 border-start d-flex flex-column gap-1" th:if="${!#lists.isEmpty(p.comments)}">
              <div th:each="c : ${p.comments}">
                <small>
                  <strong th:text="${c.author}">author</strong>:
                  <span th:text="${c.content}">comment</span>
                </small>
              </div>
            </div>

            <form class="commentForm mt-2 d-flex gap-2">
              <input type="hidden" class="commentPostId" th:value="${p.id}">
              <input type="text" class="form-control form-control-sm commentContent" placeholder="Viet binh luan..." maxlength="500">
              <button type="submit" class="btn btn-sm btn-outline-secondary">Gui</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<audio id="siteMusic" th:src="@{/music/home.mp3}" loop preload="auto"></audio>
<button id="siteMusicToggleBtn" class="btn theme-outline-btn btn-sm theme-text" style="position: fixed; bottom: 10px; right: 10px; z-index: 999;">
  🔊 Tat Nhac
</button>

<style>
  @media (max-width: 767.98px) {
    #homeMain {
      padding-left: 10px !important;
      padding-right: 10px !important;
      padding-top: 1rem !important;
    }
    .home-main-actions .btn {
      width: min(420px, 100%);
    }
    .scroll-posts {
      max-height: none !important;
    }
    .commentForm {
      flex-wrap: wrap;
    }
    .commentForm .commentContent {
      width: 100%;
      min-width: 0;
    }
    .commentForm button {
      width: 100%;
    }
  }
</style>

<script th:replace="~{fragments :: appScripts('home')}"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('postForm');
    const contentEl = document.getElementById('postContent');
    const authorLabel = document.getElementById('postAuthorLabel');
    const siteMusic = document.getElementById('siteMusic');
    const siteToggleBtn = document.getElementById('siteMusicToggleBtn');
    const currentUser = window.CaroUser?.get?.() || null;

    if (authorLabel) {
      authorLabel.textContent = currentUser?.displayName || currentUser?.userId || 'Can dang nhap';
    }

    if (siteMusic) {
      siteMusic.volume = 0.3;
      if (localStorage.getItem('music') === 'off') {
        siteMusic.pause();
        siteToggleBtn.textContent = '🔇 Bat Nhac';
      } else {
        siteMusic.play().catch(() => {});
        siteToggleBtn.textContent = '🔊 Tat Nhac';
      }
      siteToggleBtn?.addEventListener('click', () => {
        if (siteMusic.paused) {
          siteMusic.play().then(() => {
            siteToggleBtn.textContent = '🔊 Tat Nhac';
            localStorage.setItem('music', 'on');
          }).catch(() => {});
        } else {
          siteMusic.pause();
          siteToggleBtn.textContent = '🔇 Bat Nhac';
          localStorage.setItem('music', 'off');
        }
      });
    }

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = contentEl.value.trim();
      if (!content) {
        return;
      }
      if (!currentUser?.userId) {
        alert('Can dang nhap de dang bai');
        return;
      }
      try {
        const res = await fetch('/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content, author: currentUser.displayName || currentUser.userId, imagePath: '' })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
          throw new Error(data.error || 'Khong dang bai duoc');
        }
        if (!data.success) {
          throw new Error('Khong dang bai duoc');
        }
        window.location.reload();
      } catch (err) {
        alert(err.message);
      }
    });

    document.querySelectorAll('.commentForm').forEach((commentForm) => {
      commentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentUser?.userId) {
          alert('Can dang nhap de binh luan');
          return;
        }
        const postId = Number(commentForm.querySelector('.commentPostId')?.value || 0);
        const input = commentForm.querySelector('.commentContent');
        const content = (input?.value || '').trim();
        if (!postId || !content) {
          return;
        }
        try {
          const res = await fetch('/posts/comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ postId, content, author: currentUser.displayName || currentUser.userId })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data.success === false) {
            throw new Error(data.error || 'Khong gui binh luan duoc');
          }
          window.location.reload();
        } catch (err) {
          alert(err.message);
        }
      });
    });
  });
</script>
</body>
</html>
