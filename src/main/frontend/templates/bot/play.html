<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead(${title})}"></head>
<body>
<div th:replace="~{fragments :: appShell('bot-play')}"></div>

<main class="board-page-shell text-center">
  <section class="theme-box board-page-hero">
    <div class="home-dashboard__eyebrow">
      <i class="bi bi-cpu"></i>
      <span>Caro / Dau voi bot</span>
    </div>
    <h1 class="gx-page-title theme-text fw-bold mt-2 mb-1" th:text="${title}">Tran dau voi bot</h1>
    <p id="botStatus" class="theme-text mb-0">Ban danh X. Chon o de danh.</p>
    <div class="board-page-hero__actions">
      <button id="resetBtn" class="btn btn-outline-warning">Choi lai</button>
      <button id="botSurrenderBtn" class="btn btn-outline-danger">Dau hang</button>
      <a th:href="@{/game-mode/bot(game='caro')}" class="btn btn-outline-secondary">Ve chon bot</a>
    </div>
  </section>

  <section class="theme-box board-page-stage">
    <div class="board-page-stage__inner">
      <div id="botBoard" class="bot-board"></div>
    </div>
  </section>
</main>

<style>
  .bot-board {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    width: min(90vw, 720px);
    aspect-ratio: 1 / 1;
    margin: 0 auto 24px auto;
    border: 1px solid #555;
    background: rgba(255,255,255,.04);
  }
  .bot-cell {
    border: 1px solid rgba(128,128,128,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    aspect-ratio: 1 / 1;
    font-size: clamp(12px, 2.2vw, 22px);
  }
  .bot-cell.disabled { cursor: not-allowed; }
  .bot-cell.x { color: #0d6efd; }
  .bot-cell.o { color: #dc3545; }
  .bot-cell.win { background: rgba(255, 193, 7, .25); }
  .bot-cell.last-move { box-shadow: inset 0 0 0 2px rgba(13, 202, 240, .9); }
  @media (max-width: 576px) {
    .bot-board { width: 96vw; }
  }
</style>

<th:block th:replace="~{fragments :: appScripts('bot-play')}"></th:block>
<script th:inline="javascript">
  (function () {
    const appPath = (window.CaroUrl && typeof window.CaroUrl.path === 'function')
      ? window.CaroUrl.path
      : (value) => value;
    const ui = window.CaroUi || {};
    const historyApi = window.CaroHistory || {};
    const mode = /*[[${mode}]]*/ 'easy';
    const boardSize = 15;
    const board = Array.from({ length: boardSize }, () => Array(boardSize).fill(''));
    const boardEl = document.getElementById('botBoard');
    const statusEl = document.getElementById('botStatus');
    const surrenderBtn = document.getElementById('botSurrenderBtn');
    let busy = false;
    let gameOver = false;
    let currentWinLine = [];
    let lastMove = null;
    let currentMatchCode = createMatchCode();
    let historyRecorded = false;

    function createMatchCode() {
      return typeof historyApi.newMatchCode === 'function'
        ? historyApi.newMatchCode('caro-bot-' + mode)
        : ('BOT-CARO-' + Date.now());
    }

    function countMoves() {
      let moves = 0;
      for (let x = 0; x < boardSize; x++) {
        for (let y = 0; y < boardSize; y++) {
          if (board[x][y]) {
            moves += 1;
          }
        }
      }
      return moves;
    }

    async function recordHistory(outcome) {
      if (historyRecorded || typeof historyApi.recordBotMatch !== 'function') {
        return;
      }
      historyRecorded = true;
      try {
        await historyApi.recordBotMatch({
          gameCode: 'caro',
          difficulty: mode,
          outcome,
          totalMoves: countMoves(),
          firstPlayerRole: 'player',
          matchCode: currentMatchCode
        });
      } catch (_) {
        historyRecorded = false;
      }
    }

    function cellId(x, y) {
      return 'bot-cell-' + x + '-' + y;
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let x = 0; x < boardSize; x++) {
        for (let y = 0; y < boardSize; y++) {
          const el = document.createElement('div');
          el.id = cellId(x, y);
          el.className = 'bot-cell';
          const value = board[x][y];
          if (value) {
            el.textContent = value;
            el.classList.add(value.toLowerCase());
          }
          if (isWinningCell(x, y)) {
            el.classList.add('win');
          }
          if (isLastMoveCell(x, y)) {
            el.classList.add('last-move');
          }
          if (busy || gameOver) {
            el.classList.add('disabled');
          }
          el.addEventListener('click', () => handlePlayerMove(x, y));
          boardEl.appendChild(el);
        }
      }
      if (surrenderBtn) {
        surrenderBtn.disabled = busy || gameOver;
      }
    }

    function setCell(x, y, value) {
      if (x < 0 || y < 0 || x >= boardSize || y >= boardSize) return;
      board[x][y] = value;
      const el = document.getElementById(cellId(x, y));
      if (!el) return;
      el.textContent = value;
      el.classList.remove('x', 'o', 'win', 'last-move');
      if (value) el.classList.add(value.toLowerCase());
      if (isWinningCell(x, y)) el.classList.add('win');
      if (isLastMoveCell(x, y)) el.classList.add('last-move');
    }

    function setWinLine(winLine) {
      if (!Array.isArray(winLine)) {
        currentWinLine = [];
        return;
      }
      currentWinLine = winLine
        .filter((m) => typeof m?.x === 'number' && typeof m?.y === 'number')
        .map((m) => ({ x: m.x, y: m.y }));
    }

    function isWinningCell(x, y) {
      return currentWinLine.some((m) => m.x === x && m.y === y);
    }

    function setLastMove(move) {
      if (!move || typeof move.x !== 'number' || typeof move.y !== 'number') {
        lastMove = null;
        return;
      }
      lastMove = { x: move.x, y: move.y };
    }

    function isLastMoveCell(x, y) {
      return !!lastMove && lastMove.x === x && lastMove.y === y;
    }

    async function callReset() {
      await fetch(appPath('/bot/reset'), { method: 'POST' });
    }

    async function resetGame() {
      busy = true;
      gameOver = false;
      currentWinLine = [];
      lastMove = null;
      historyRecorded = false;
      currentMatchCode = createMatchCode();
      for (let x = 0; x < boardSize; x++) {
        for (let y = 0; y < boardSize; y++) {
          board[x][y] = '';
        }
      }
      renderBoard();
      statusEl.textContent = 'Dang khoi tao van moi...';
      try {
        await callReset();
        statusEl.textContent = 'Ban danh X. Chon o de danh.';
      } catch (_) {
        statusEl.textContent = 'Khong reset duoc bot. Thu lai.';
      } finally {
        busy = false;
        if (!gameOver) {
          renderBoard();
        }
      }
    }

    async function handlePlayerMove(x, y) {
      if (busy || gameOver) return;
      if (board[x][y]) return;

      busy = true;
      setLastMove({ x, y });
      setCell(x, y, 'X');
      statusEl.textContent = 'Bot dang tinh nuoc...';
      renderBoard();

      try {
        const endpoint = mode === 'hard' ? appPath('/bot/hard-move') : appPath('/bot/easy-move');
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x, y })
        });
        if (!res.ok) {
          throw new Error('Khong goi duoc API bot');
        }

        const data = await res.json();
        if (data && data.success === false) {
          throw new Error(data.error || 'Loi xu ly nuoc di');
        }
        setWinLine(data?.winLine);
        if (typeof data.x === 'number' && typeof data.y === 'number' && data.x >= 0 && data.y >= 0) {
          if (board[data.x][data.y]) {
            throw new Error('Bot tra nuoc di khong hop le');
          }
          setLastMove({ x: data.x, y: data.y });
          setCell(data.x, data.y, 'O');
        }

        if (data.playerWin) {
          gameOver = true;
          statusEl.textContent = 'Ban thang!';
          ui.toast?.('Ban thang!', { type: 'success' });
          recordHistory('win');
          return;
        }
        if (data.botWin) {
          gameOver = true;
          statusEl.textContent = 'Bot thang!';
          ui.toast?.('Bot thang!', { type: 'warning' });
          recordHistory('loss');
          return;
        }
        if (data.draw) {
          gameOver = true;
          statusEl.textContent = 'Hoa co!';
          ui.toast?.('Van dau hoa!', { type: 'info' });
          recordHistory('draw');
          return;
        }

        statusEl.textContent = 'Ban danh X. Chon o de danh.';
      } catch (err) {
        setWinLine([]);
        setLastMove(null);
        setCell(x, y, '');
        statusEl.textContent = err?.message || 'Loi khong xac dinh';
      } finally {
        busy = false;
        renderBoard();
      }
    }

    document.getElementById('resetBtn')?.addEventListener('click', resetGame);
    surrenderBtn?.addEventListener('click', () => {
      if (busy || gameOver) return;
      if (typeof window.confirm === 'function' && !window.confirm('Ban chac chan muon dau hang?')) {
        return;
      }
      gameOver = true;
      setWinLine([]);
      statusEl.textContent = 'Ban da dau hang! Bot thang.';
      ui.toast?.('Ban da dau hang!', { type: 'warning' });
      recordHistory('loss');
      renderBoard();
    });

    renderBoard();
    resetGame();
  })();
</script>
</body>
</html>
