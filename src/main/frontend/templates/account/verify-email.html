<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Xac thuc email')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-verify')}"></div>

<main class="auth-shell auth-onboard">
  <section class="auth-onboard__card" aria-labelledby="verifyTitle">
    <div class="auth-onboard__chrome">
      <a class="auth-onboard__nav-btn" th:href="@{/account/register-page}" aria-label="Quay lai dang ky">
        <i class="bi bi-chevron-left"></i>
      </a>
      <div class="auth-onboard__title">Xac thuc email</div>
      <a class="auth-onboard__close-btn" th:href="@{/}" aria-label="Dong trang xac thuc">
        <i class="bi bi-x-lg"></i>
      </a>
    </div>

    <div class="auth-onboard__body">
      <div class="auth-onboard__eyebrow">
        <i class="bi bi-envelope-check"></i>
        <span>Kich hoat tai khoan</span>
      </div>
      <h1 id="verifyTitle" class="auth-onboard__heading">Hoan tat xac thuc email</h1>
      <p class="auth-onboard__copy">
        Nhap email va ma 6 so da nhan de kich hoat tai khoan truoc khi dang nhap.
      </p>

      <form id="verifyForm" class="auth-onboard__grid">
        <label class="auth-onboard__label" for="email">
          <span>Email</span>
          <input id="email" type="email" class="auth-onboard__input" placeholder="ban@example.com" required autocomplete="email">
        </label>
        <label class="auth-onboard__label" for="code">
          <span>Ma xac thuc</span>
          <input id="code" class="auth-onboard__input" placeholder="Nhap ma 6 so" required inputmode="numeric">
        </label>
        <button type="submit" class="auth-onboard__cta">Xac thuc</button>
      </form>

      <div class="auth-onboard__support">
        <button id="resendCodeBtn" type="button" class="auth-onboard__link-btn">Gui lai ma</button>
        <a class="auth-onboard__link-btn" th:href="@{/account/login-page}">Ve dang nhap</a>
      </div>

      <div class="auth-onboard__microcopy">
        Neu ma het han, hay yeu cau gui lai ma moi va thu lai ngay tai day.
      </div>

      <div id="out" class="auth-onboard__status small" role="status" aria-live="polite"></div>
    </div>
  </section>
</main>

<th:block th:replace="~{fragments :: appScripts('account-verify')}"></th:block>
<script th:src="@{/js/account-verify-email.js}"></script>
</body>
</html>
