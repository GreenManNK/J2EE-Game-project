spring:
  datasource:
    url: jdbc:h2:mem:caro_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  thymeleaf:
    cache: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client
            client-secret: test-google-secret
          facebook:
            client-id: test-facebook-client
            client-secret: test-facebook-secret

app:
  api:
    sync-key: test-sync-key
  blackjack:
    fixed-deck-enabled: true
  runtime:
    canonical-url:
      enforce: false
  email:
    mode: log
