services:
  game:
    build:
      context: .
      dockerfile: Dockerfile
    image: game-hub:local
    container_name: game-hub
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      APP_EMAIL_MODE: log
      APP_DATASOURCE_ALLOW_H2_FALLBACK: "true"
      APP_DATASOURCE_H2_FILE: /app/data/game-docker
    volumes:
      - ./.data-docker:/app/data
    restart: unless-stopped
