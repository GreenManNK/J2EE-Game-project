<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: appHead('Dat lai mat khau')}"></head>
<body>
<div th:replace="~{fragments :: appShell('account-reset')}"></div>

<main class="auth-shell auth-onboard">
  <section class="auth-onboard__card" aria-labelledby="resetTitle">
    <div class="auth-onboard__chrome">
      <a class="auth-onboard__nav-btn" th:href="@{/account/login-page}" aria-label="Quay lai dang nhap">
        <i class="bi bi-chevron-left"></i>
      </a>
      <div class="auth-onboard__title">Dat lai mat khau</div>
      <a class="auth-onboard__close-btn" th:href="@{/}" aria-label="Dong trang dat lai mat khau">
        <i class="bi bi-x-lg"></i>
      </a>
    </div>

    <div class="auth-onboard__body">
      <div class="auth-onboard__eyebrow">
        <i class="bi bi-key"></i>
        <span>Khoi phuc truy cap</span>
      </div>
      <h1 id="resetTitle" class="auth-onboard__heading">Lay lai quyen truy cap an toan</h1>
      <p class="auth-onboard__copy">
        Gui ma dat lai, xac thuc ma va dat mat khau moi trong mot flow duy nhat.
      </p>

      <form id="sendForm" class="auth-onboard__grid">
        <label class="auth-onboard__label" for="email">
          <span>Email</span>
          <input id="email" type="email" class="auth-onboard__input" placeholder="ban@example.com" required autocomplete="email">
        </label>
        <button class="auth-onboard__link-btn" type="submit">Gui ma dat lai</button>
      </form>

      <form id="resetForm" class="auth-onboard__grid">
        <label class="auth-onboard__label" for="code">
          <span>Ma xac thuc</span>
          <input id="code" class="auth-onboard__input" placeholder="Nhap ma da nhan" required>
        </label>

        <div class="auth-onboard__support">
          <button id="verifyCodeBtn" class="auth-onboard__link-btn" type="button">Xac thuc ma</button>
          <small id="verifyCodeStatus" class="auth-onboard__microcopy">Chua xac thuc ma</small>
        </div>

        <label class="auth-onboard__label" for="newPassword">
          <span>Mat khau moi</span>
          <input id="newPassword" type="password" class="auth-onboard__input" placeholder="Nhap mat khau moi" required autocomplete="new-password">
        </label>
        <label class="auth-onboard__label" for="confirmPassword">
          <span>Xac nhan mat khau</span>
          <input id="confirmPassword" type="password" class="auth-onboard__input" placeholder="Nhap lai mat khau moi" required autocomplete="new-password">
        </label>
        <button id="resetBtn" class="auth-onboard__cta" type="submit" disabled>Dat lai mat khau</button>
      </form>

      <div id="out" class="auth-onboard__status small" role="status" aria-live="polite"></div>
    </div>
  </section>
</main>

<th:block th:replace="~{fragments :: appScripts('account-reset')}"></th:block>
<script th:src="@{/js/account-reset-password.js}"></script>
</body>
</html>
